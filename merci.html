<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci — Coerver® Coaching Tunisie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body { background: #0d0d0d; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
    .merci-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .merci-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-top: 4px solid #27ae60;
      border-radius: 8px;
      padding: 60px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .merci-icon {
      width: 72px;
      height: 72px;
      background: rgba(39,174,96,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .merci-icon svg { width: 36px; height: 36px; }
    .merci-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #27ae60;
      margin-bottom: 16px;
      display: block;
    }
    .merci-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 5vw, 3rem);
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
      margin-bottom: 20px;
    }
    .merci-text {
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .merci-text strong { color: #27ae60; }
    .merci-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .merci-btn-home {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #000;
      background: #27ae60;
      padding: 16px 32px;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .merci-btn-home:hover { background: #2ecc71; }
    .merci-btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px 32px;
      border-radius: 4px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .merci-btn-wa:hover { border-color: #25d366; color: #25d366; }
    .merci-logo {
      display: block;
      margin: 0 auto 40px;
      height: 40px;
      opacity: 0.7;
    }
    @media (max-width: 480px) {
      .merci-box { padding: 40px 24px; }
    }
  </style>
</head>

        <svg viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
